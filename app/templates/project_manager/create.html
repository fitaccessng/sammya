{% extends "project_manager/base.html" %}

{% block title %}Create Project - Project Manager{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Create New Project</h1>

    <div class="bg-white rounded-lg shadow p-8">
        <form method="POST" class="space-y-6">
            <!-- Project Name -->
            <div>
                <label for="name" class="block text-sm font-bold text-gray-900 mb-2">Project Name *</label>
                <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter project name">
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-bold text-gray-900 mb-2">Description</label>
                <textarea id="description" name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter project description"></textarea>
            </div>

            <!-- Budget -->
            <div>
                <label for="budget" class="block text-sm font-bold text-gray-900 mb-2">Budget (₦) *</label>
                <input type="number" id="budget" name="budget" step="0.01" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
            </div>

            <!-- Dates -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="start_date" class="block text-sm font-bold text-gray-900 mb-2">Start Date *</label>
                    <input type="date" id="start_date" name="start_date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="end_date" class="block text-sm font-bold text-gray-900 mb-2">End Date *</label>
                    <input type="date" id="end_date" name="end_date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="block text-sm font-bold text-gray-900 mb-2">Status</label>
                <select id="status" name="status" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="planning">Planning</option>
                    <option value="active">Active</option>
                    <option value="on_hold">On Hold</option>
                </select>
            </div>

            <!-- Buttons -->
            <div class="flex items-center space-x-4 pt-6">
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-lg hover:bg-blue-700 font-medium">
                    Create Project
                </button>
                <a href="{{ url_for('project.dashboard') }}" class="px-8 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-gray-900">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
