{% extends "project_manager/base.html" %}

{% block title %}Edit Project - Project Manager{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Edit Project</h1>

    <div class="bg-white rounded-lg shadow p-8">
        <form method="POST" class="space-y-6">
            <!-- Project Name -->
            <div>
                <label for="name" class="block text-sm font-bold text-gray-900 mb-2">Project Name *</label>
                <input type="text" id="name" name="name" value="{{ project.name }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-bold text-gray-900 mb-2">Description</label>
                <textarea id="description" name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">{{ project.description or '' }}</textarea>
            </div>

            <!-- Budget -->
            <div>
                <label for="budget" class="block text-sm font-bold text-gray-900 mb-2">Budget (₦) *</label>
                <input type="number" id="budget" name="budget" step="0.01" value="{{ project.budget }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Dates -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="start_date" class="block text-sm font-bold text-gray-900 mb-2">Start Date *</label>
                    <input type="date" id="start_date" name="start_date" value="{{ project.start_date.strftime('%Y-%m-%d') if project.start_date else '' }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="end_date" class="block text-sm font-bold text-gray-900 mb-2">End Date *</label>
                    <input type="date" id="end_date" name="end_date" value="{{ project.end_date.strftime('%Y-%m-%d') if project.end_date else '' }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="block text-sm font-bold text-gray-900 mb-2">Status</label>
                <select id="status" name="status" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="planning" {% if project.status == 'planning' %}selected{% endif %}>Planning</option>
                    <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
                    <option value="on_hold" {% if project.status == 'on_hold' %}selected{% endif %}>On Hold</option>
                    <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <!-- Buttons -->
            <div class="flex items-center space-x-4 pt-6">
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-lg hover:bg-blue-700 font-medium">
                    Save Changes
                </button>
                <a href="{{ url_for('project.project_details', project_id=project.id) }}" class="px-8 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-gray-900">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
