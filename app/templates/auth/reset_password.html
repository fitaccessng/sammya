{% extends "base.html" %}

{% block title %}Reset Password - Sammya{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-slate-50">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">Sammya</h1>
            <h2 class="text-2xl font-bold text-slate-900 text-center mb-6">Create New Password</h2>
            <p class="text-center text-slate-600 text-sm mb-6">Enter a strong new password</p>
            
            <form method="POST" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 placeholder-slate-400 focus:border-blue-500 focus:ring-blue-500"
                        placeholder="••••••••">
                    <p class="mt-1 text-xs text-slate-500">Min 6 characters</p>
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-slate-700">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        required 
                        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 placeholder-slate-400 focus:border-blue-500 focus:ring-blue-500"
                        placeholder="••••••••">
                </div>
                
                <button 
                    type="submit" 
                    class="w-full px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition">
                    Reset Password
                </button>
            </form>
            
            <div class="mt-6 border-t border-slate-200 pt-4 text-center">
                <p class="text-sm text-slate-600">
                    <a href="{{ url_for('main.login') }}" class="text-blue-600 hover:text-blue-800 font-semibold">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
