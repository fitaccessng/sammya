{% extends "procurement/base.html" %}

{% block page_title %}Edit Asset{% endblock %}
{% block page_subtitle %}Modify asset information{% endblock %}

{% block main_content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-8">
        <form method="POST" class="space-y-6">
            <!-- Description -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                <input type="text" name="description" value="{{ asset.item_description or '' }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Unit -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Unit</label>
                <input type="text" name="unit" value="{{ asset.unit or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Quantity -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Quantity on Hand</label>
                <input type="number" name="quantity_on_hand" step="0.01" value="{{ asset.quantity_on_hand or 0 }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Reorder Level -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Reorder Level</label>
                <input type="number" name="reorder_level" step="0.01" value="{{ asset.reorder_level or 0 }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-3 pt-4 border-t border-gray-200">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                    <i class="fas fa-save mr-2"></i> Update Asset
                </button>
                <a href="{{ url_for('procurement.assets') }}" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition text-center">
                    <i class="fas fa-times mr-2"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
